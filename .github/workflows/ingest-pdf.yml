name: Auto-ingest Schedules

on:
  push:
    paths:
      - 'schedules/inbox/**/*.pdf'
      - 'schedules/inbox/*.pdf'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LairPages
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LAIR_REPO_PAT }}
          path: LairPages

      - name: Checkout Lair (dependency for validation)
        uses: actions/checkout@v4
        with:
          repository: emmby/Lair
          token: ${{ secrets.LAIR_REPO_PAT }}
          path: Lair

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'LairPages/package-lock.json'

      - name: Install dependencies
        run: |
          cd LairPages
          npm ci

      - name: Process, Test, and Commit each PDF individually
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.LAIR_REPO_PAT }}
        run: |
          cd LairPages
          
          # Find all PDFs in schedules/inbox if the directory exists
          if [ -d "schedules/inbox" ]; then
            files=$(find schedules/inbox -maxdepth 1 -name "*.pdf" | sort)
          else
            files=""
          fi
          if [ -z "$files" ]; then
            echo "No inbox PDFs to process."
            exit 0
          fi
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          for file in $files; do
            echo "----------------------------------------"
            echo "Processing: $file"
            echo "----------------------------------------"
            
            # Run conversion
            set +e
            npx tsx src/index.ts "$file" --no-cache
            convert_status=$?
            set -e
            
            # Read last run summary
            lastrun_file=".tmp/processpdf_lastrun.json"
            if [ -f "$lastrun_file" ]; then
              success=$(jq -r '.success' "$lastrun_file")
              year=$(jq -r '.year' "$lastrun_file")
              camp=$(jq -r '.camp' "$lastrun_file")
              week=$(jq -r '.week' "$lastrun_file")
            else
              success="false"
              year="null"
              camp="null"
              week="null"
            fi
            
            # Determine branch name
            if [ "$year" != "null" ] && [ "$camp" != "null" ] && [ "$week" != "null" ]; then
              padded_week=$(printf "%02d" "$week")
              branch_name="ingest/${year}-${camp}-week-${padded_week}"
            else
              clean_filename=$(basename "$file" | tr -cd 'a-zA-Z0-9_-' | tr ' ' '_')
              branch_name="ingest/failed-${clean_filename}"
            fi
            
            echo "Standardized Branch Name: $branch_name"
            
            # Check if PR is already open
            pr_number=$(gh pr list --head "$branch_name" --state open --json number --jq '.[0].number')
            if [ -n "$pr_number" ]; then
              echo "PR #$pr_number already open for branch $branch_name. Skipping."
              # Reset changes to main and proceed to next file
              git checkout main
              git reset --hard origin/main
              continue
            fi
            
            # Checkout to the branch (this carries local uncommitted changes over)
            git checkout -b "$branch_name"
            
            # Staging changes (including the moved PDF, the generated JSON if any, the manifest, and the deletion of the inbox PDF)
            git add schedules/
            
            # Commit the changes (suppress error if nothing to commit)
            git diff --cached --quiet || git commit -m "Auto-ingest schedule: $(basename "$file")"
            
            # Push the branch to remote
            git push origin "$branch_name" --force
            
            # Test & PR Decisions
            if [ "$success" = "true" ]; then
              # Run test suite to validate map locations, dates etc.
              set +e
              npm test
              test_status=$?
              set -e
              
              if [ $test_status -eq 0 ]; then
                echo "Parsing and tests succeeded. Creating and auto-merging PR..."
                gh pr create --title "Auto-ingest schedule: $(basename "$file")" \
                             --body "Successfully processed and validated schedule from $(basename "$file")." \
                             --head "$branch_name" \
                             --base main
                gh pr merge "$branch_name" --merge --delete-branch
              else
                echo "Parsing succeeded but tests failed. Creating open PR for review..."
                gh pr create --title "[FAILED] Auto-ingest schedule: $(basename "$file")" \
                             --body "Schedule was processed, but failed validation tests (e.g. location mapping or time boundaries). Please inspect the test logs on the PR." \
                             --head "$branch_name" \
                             --base main
              fi
            else
              echo "Parsing failed. Creating open PR for review..."
              gh pr create --title "[FAILED] Auto-ingest schedule: $(basename "$file")" \
                           --body "Parsing pipeline failed. Please check the logs of the ingestion workflow run." \
                           --head "$branch_name" \
                           --base main
            fi
            
            # Switch back to main, reset, and sync before next file
            git checkout main
            git reset --hard origin/main
            git pull --rebase origin main
          done
