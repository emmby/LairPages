name: Validate and Deploy Schedules

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. Validation Job
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LairPages
        uses: actions/checkout@v4
        with:
          path: LairPages

      - name: Checkout Lair (dependency using PAT)
        uses: actions/checkout@v4
        with:
          repository: emmby/Lair
          token: ${{ secrets.LAIR_REPO_PAT }}
          path: Lair

      - name: Set up Dart
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Tests
        run: |
          cd LairPages
          dart pub get
          dart test

  # 2. Deployment Job (Only runs on push to main if tests pass)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test  # Enforces that tests must pass first
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout LairPages
        uses: actions/checkout@v4
        with:
          path: LairPages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'LairPages/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
